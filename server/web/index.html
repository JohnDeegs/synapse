<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse</title>
  <link rel="stylesheet" href="/web/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
</head>
<body>

  <!-- ── Login View ── -->
  <div id="view-login">
    <div class="login-box">
      <h1 class="login-brand">Synapse</h1>

      <div id="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign in</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <form id="form-login">
        <label class="field-label">Email
          <input type="email" id="login-email" autocomplete="email" required>
        </label>
        <label class="field-label">Password
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn-primary btn-submit-full">Sign in</button>
      </form>

      <form id="form-register" class="hidden">
        <label class="field-label">Email
          <input type="email" id="reg-email" autocomplete="email" required>
        </label>
        <label class="field-label">Password
          <input type="password" id="reg-password" autocomplete="new-password" required>
        </label>
        <div id="reg-error" class="error-msg"></div>
        <button type="submit" class="btn-primary btn-submit-full">Create account</button>
      </form>
    </div>
  </div>

  <!-- ── App View ── -->
  <div id="view-app" class="hidden">

    <header class="app-header">
      <span class="brand-name">Synapse</span>
      <div class="header-right">
        <span id="user-email" class="user-email"></span>
        <button id="btn-theme" class="btn-text btn-theme-toggle" title="Toggle dark mode">🌙</button>
        <button id="btn-logout" class="btn-text">Sign out</button>
      </div>
    </header>

    <div class="app-body">

      <!-- Stats Bar (full width) -->
      <div class="stats-bar">
        <div class="stat-item">
          <span id="stat-active" class="stat-num">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-item">
          <span id="stat-due" class="stat-num stat-urgent">0</span>
          <span class="stat-label">Due in 1h</span>
        </div>
        <div class="stat-item">
          <span id="stat-completed" class="stat-num">0</span>
          <span class="stat-label">Completed this week</span>
        </div>
        <div class="stat-item">
          <span id="stat-health" class="stat-num">–</span>
          <span class="stat-label">Today</span>
        </div>
      </div>

      <!-- Health Bar -->
      <div class="health-bar-section">
        <div class="health-bar-track">
          <div id="health-bar-fill" class="health-bar-fill"></div>
        </div>
        <span id="health-bar-label" class="health-bar-label"></span>
      </div>

      <!-- Health Grid -->
      <div id="health-grid" class="health-grid-section"></div>

      <!-- Two-column layout: sidebar + main -->
      <div class="app-layout">

        <!-- Left Sidebar: Tags -->
        <aside class="sidebar">
          <div class="sidebar-section">
            <h3 class="sidebar-heading">Filter by Tag</h3>
            <div id="tag-filters">
              <!-- chips rendered by JS -->
            </div>
          </div>
          <div class="sidebar-section">
            <h3 class="sidebar-heading">New Tag</h3>
            <div class="create-tag-form">
              <input type="text" id="new-tag-name" placeholder="Tag name" maxlength="40">
              <button id="btn-create-tag" class="btn-primary">+</button>
            </div>
            <div id="create-tag-error" class="error-msg"></div>
          </div>

          <div class="sidebar-section">
            <h3 class="sidebar-heading">Telegram</h3>
            <div id="telegram-settings">
              <!-- rendered by JS -->
            </div>
          </div>

          <div class="sidebar-section">
            <h3 class="sidebar-heading">Quiet Hours</h3>
            <p style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:10px;line-height:1.4;">
              Pauses check-in reminders during sleep. Tasks due overnight reschedule to wake-up time.
            </p>
            <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;cursor:pointer;">
              <input type="checkbox" id="quiet-enabled-web" />
              Enable quiet hours
            </label>
            <div id="quiet-range-web" style="margin-top:10px;">
              <label for="quiet-start-web" class="sidebar-label">From</label>
              <select id="quiet-start-web" class="sidebar-select"></select>
              <label for="quiet-end-web" class="sidebar-label" style="margin-top:8px;">Until</label>
              <select id="quiet-end-web" class="sidebar-select"></select>
            </div>
            <button id="quiet-save-web" class="btn-secondary" style="margin-top:10px;width:100%;">Save</button>
            <div id="quiet-msg-web" style="font-size:0.8rem;margin-top:6px;min-height:1em;"></div>
          </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

          <!-- Controls -->
          <div class="controls-bar">
            <div class="filter-group">
              <label class="select-all-label">
                <input type="checkbox" id="select-all" title="Select all visible tasks">
                All
              </label>
              <label>Status:
                <select id="filter-status">
                  <option value="active">Active</option>
                  <option value="completed">Completed</option>
                  <option value="all">All</option>
                </select>
              </label>
              <label>Due:
                <select id="filter-due">
                  <option value="all">All</option>
                  <option value="today">Today</option>
                  <option value="week">This week</option>
                  <option value="month">This month</option>
                </select>
              </label>
              <label>Sort:
                <select id="sort-by">
                  <option value="next_reminder">Next reminder</option>
                  <option value="priority">Priority</option>
                  <option value="created_at">Created</option>
                </select>
              </label>
            </div>
            <button id="btn-new-task" class="btn-primary">+ New Task</button>
          </div>

          <!-- Bulk Action Bar (hidden until tasks selected) -->
          <div id="bulk-bar" class="bulk-bar hidden">
            <span id="bulk-count">0 selected</span>
            <button id="btn-bulk-complete" class="btn-action">✓ Complete</button>
            <button id="btn-bulk-snooze" class="btn-action">⏰ Snooze 1h</button>
            <button id="btn-bulk-delete" class="btn-action btn-danger-action">✕ Delete</button>
            <button id="btn-bulk-clear" class="btn-text">Clear</button>
          </div>

          <!-- New Task Form -->
          <div id="new-task-form" class="new-task-form hidden">
            <h3>New Task</h3>
            <input type="text" id="new-title" placeholder="Task title" required>
            <select id="new-priority">
              <option value="P0">P0 – Critical (every 30 min)</option>
              <option value="P1">P1 – High (every 2 hr)</option>
              <option value="P2" selected>P2 – Medium (every 24 hr)</option>
              <option value="P3">P3 – Low (every 3 days)</option>
              <option value="P4">P4 – Future (weekly)</option>
            </select>
            <button type="button" id="new-due-date-btn" class="dp-trigger">📅 Loading…</button>
            <textarea id="new-desc" placeholder="Description (Markdown supported)" rows="3"></textarea>
            <div id="create-error" class="error-msg"></div>
            <div class="form-actions">
              <button id="btn-create-task" class="btn-primary">Create</button>
              <button id="btn-cancel-task" class="btn-text">Cancel</button>
            </div>
          </div>

          <!-- Task List -->
          <div id="task-list">
            <div class="loading">Loading tasks…</div>
          </div>

        </main>
      </div><!-- .app-layout -->

    </div><!-- .app-body -->
  </div><!-- #view-app -->

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script src="/web/datepicker.js"></script>
  <script src="/web/app.js"></script>
</body>
</html>
